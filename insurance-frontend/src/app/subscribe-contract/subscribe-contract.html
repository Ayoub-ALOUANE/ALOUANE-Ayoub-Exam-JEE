<div class="container mt-4">
  <div class="card col-md-8 mx-auto">
    <div class="card-header bg-success text-white">Nouvelle Souscription - Client #{{clientId}}</div>
    <div class="card-body">
      <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
      <form (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Type de Contrat</label>
            <select class="form-select" [(ngModel)]="contractType" name="contractType">
              <option value="AUT">Automobile</option>
              <option value="HAB">Habitation</option>
              <option value="SAN">Santé</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Montant Cotisation</label>
            <input type="number" class="form-control" [(ngModel)]="montantCotisation" name="montant" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Durée (mois)</label>
            <input type="number" class="form-control" [(ngModel)]="duree" name="duree" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Taux de Couverture (0-1)</label>
            <input type="number" step="0.1" class="form-control" [(ngModel)]="tauxCouverture" name="taux" required>
          </div>
        </div>

        <!-- Automobile Fields -->
        <div *ngIf="contractType === 'AUT'" class="border p-3 mb-3 bg-light">
          <h6>Détails Véhicule</h6>
          <div class="mb-2">
            <label class="form-label">Matricule</label>
            <input type="text" class="form-control" [(ngModel)]="matricule" name="matricule" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-2">
              <label class="form-label">Marque</label>
              <input type="text" class="form-control" [(ngModel)]="marque" name="marque" required>
            </div>
            <div class="col-md-6 mb-2">
              <label class="form-label">Modèle</label>
              <input type="text" class="form-control" [(ngModel)]="modele" name="modele" required>
            </div>
          </div>
        </div>

        <!-- Habitation Fields -->
        <div *ngIf="contractType === 'HAB'" class="border p-3 mb-3 bg-light">
          <h6>Détails Logement</h6>
          <div class="mb-2">
            <label class="form-label">Type Logement</label>
            <select class="form-select" [(ngModel)]="typeLogement" name="typeLog">
              <option value="APPARTEMENT">Appartement</option>
              <option value="MAISON">Maison</option>
              <option value="LOCAL_COMMERCIAL">Local Commercial</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Adresse</label>
            <input type="text" class="form-control" [(ngModel)]="adresse" name="adresse" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Superficie (m²)</label>
            <input type="number" class="form-control" [(ngModel)]="superficie" name="superficie" required>
          </div>
        </div>

        <!-- Sante Fields -->
        <div *ngIf="contractType === 'SAN'" class="border p-3 mb-3 bg-light">
          <h6>Détails Santé</h6>
          <div class="mb-2">
            <label class="form-label">Niveau de Couverture</label>
            <select class="form-select" [(ngModel)]="niveauCouverture" name="niveau">
              <option value="BASIQUE">Basique</option>
              <option value="INTERMEDIAIRE">Intermédiaire</option>
              <option value="PREMIUM">Premium</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Nombre de personnes</label>
            <input type="number" class="form-control" [(ngModel)]="nombrePersonnes" name="nbPers" required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Soumettre la Souscription</button>
      </form>
    </div>
  </div>
</div>
