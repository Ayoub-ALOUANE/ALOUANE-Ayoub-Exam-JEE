<div class="container mt-4">
  <div class="row">
    <div class="col-md-7">
      <div class="card">
        <div class="card-header bg-primary text-white">Contrats du Client #{{clientId}}</div>
        <div class="card-body">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Type</th>
                <th>Montant</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let c of contracts">
                <td>{{c.type}}</td>
                <td>{{c.montantCotisation}}</td>
                <td>
                  <span [class]="'badge ' + (c.statut === 'VALIDE' ? 'bg-success' : 'bg-warning')">{{c.statut}}</span>
                </td>
                <td>
                  <button class="btn btn-outline-info btn-sm me-1" (click)="showPayments(c)">Paiements</button>
                  <button *ngIf="c.statut === 'EN_COURS' && authService.hasRole('ADMIN')" 
                          class="btn btn-outline-success btn-sm" 
                          (click)="onValidate(c.id!)">Valider</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-md-5" *ngIf="selectedContract">
      <div class="card">
        <div class="card-header bg-secondary text-white">Paiements - Contrat #{{selectedContract.id}}</div>
        <div class="card-body">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Date</th>
                <th>Montant</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let p of payments">
                <td>{{p.date | date:'dd/MM/yyyy'}}</td>
                <td>{{p.montant}}</td>
                <td>{{p.type}}</td>
              </tr>
            </tbody>
          </table>

          <hr>
          <h6>Nouveau Paiement</h6>
          <form (ngSubmit)="onAddPayment()">
            <div class="mb-2">
              <input type="number" class="form-control form-control-sm" placeholder="Montant" [(ngModel)]="newPayment.montant" name="montant" required>
            </div>
            <div class="mb-2">
              <select class="form-select form-select-sm" [(ngModel)]="newPayment.type" name="type">
                <option value="MENSUALITE">Mensualité</option>
                <option value="PAIEMENT_ANNUEL">Annuel</option>
                <option value="PAIEMENT_EXCEPTIONNEL">Exceptionnel</option>
              </select>
            </div>
            <button type="submit" class="btn btn-sm btn-success w-100">Ajouter</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
